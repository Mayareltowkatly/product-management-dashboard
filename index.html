<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya+Sans:ital,wght@0,100;0,300;0,400;0,500;0,700;0,800;0,900;1,100;1,300;1,400;1,500;1,700;1,800;1,900&family=Lora:ital,wght@0,400..700;1,400..700&family=Saira:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>crud</title>
</head>
<body>
  <section class="bg-secondary-subtle">
       <!-- <div class="card shadow-lg border-0 rounded-4 mx-5"> -->
            <div class="container my-5 p-5">
               <div class="titleText">
                 <h1 class="text-center fw-bold">Product Management Dashboard</h1>
               </div>
               <p></p>
               <div class="nameContainer pt-3">
                    <label for="nameInput" class="text text-capitalize fw-bold">product name</label>
                    <input type="text" id="nameInput" oninput="validateName()" class="form-control mt-2" placeholder="enter product name..." >
                    <div class="alert alert-danger d-none mt-2 rounded-1" id="unSuccessN" role="alert">
                            Name must start with a capital letter and be at least 3 letters

                    </div>
                    <div class="alert alert-success d-none border-success " id="successN" role="alert">
                        Name is valid
                    </div>
                </div>
                <div class="priceContainer pt-3 w-25 me-4 fw-bold">
                    <label for="priceInput" >product price</label>
                    <input type="number" id="priceInput" oninput="validatePrice()" class="form-control mt-2" placeholder="enter product price..." >
                    <div class="alert alert-danger d-none rounded-1 mt-2" id="unSuccessP" role="alert">
                    Price must be between 1000 and 10000
                    </div>
                </div>
                <div class="countContainer pt-3 w-25 me-4 fw-bold">
                    <label for="countInput" >product count</label>
                    <input type="number" id="countInput" oninput="validatePrice()" class="form-control mt-2" placeholder="enter product count..." >
                </div>
                <div class="typeContainer pt-3 fw-bold">
                    <label for="typeInput" class="text text-capitalize">product type</label>
                    <input type="text" id="typeInput"oninput="validateType()" class="form-control mt-2" placeholder="enter product type..." >
                    <div class="alert alert-danger d-none rounded-1 mt-2" id="unSuccessT" role="alert">
                        Please enter a valid type: Mobile, Screen, Watch, or Tablet
                    </div>
                </div>
                <div class="descContainer pt-3 fw-bold">
                  <label for="descInput" class="text text-capitalize">product desc</label>
                  <input type="text " id="descInput" oninput="validateDesc()" class="form-control mt-2 " placeholder="enter product desc..." >
                  <div class="alert alert-danger d-none rounded-1 mt-2" id="unSuccessD"  role="alert">
                      Description must be between 3 and 300 characters
                  </div>
               </div>
               <div class="container">
                    <div class="row">
                        <div class="col-9">
                            <div class="btnsContainer text-start ">
                                <button id="addBtn" onclick="addProduct()" class="btn btn-dark w-50 p-2 my-3 rounded-pill "><i class="fa-solid fa-circle-plus"></i>add product</button>
                                <button id="updateBtn"  class="btn btn-dark w-50 p-2 my-2 rounded-pill d-none"><i class="fa-solid fa-file-pen"></i>update product</button>
                                <!-- <button id="deleteAll"  onclick="deleteProducts()" class="btn btn-dark w-50 p-2 my-2 rounded-pill ">delete all</button> -->
                                <button id="deleteAll"  class="btn btn-dark w-50 p-2 my-2 rounded-pill "><i class="fa-solid fa-trash"></i>delete all</button>
                                <input type="search" oninput="searchProduct()" id="searchInput" class=" form-control w-50 my-4  d-inline-block" placeholder="search...">
                            </div>
                        </div>
                        <div class="col-3">
                            <div class="imgFile text-end me-4 py-4">
                                <img src="images/blank-img.png" id="uploadImage" class="w-75 rounded float-end">
                                <label for="inputFile"  class="upload-btn  "><i class="fa-regular fa-image"></i>Upload Image</label>
                                <input id="inputFile" type="file" accept="image/*" class="text-end mt-3 d-none" >
                            </div>
                        </div>
                    </div> 
               </div>   
           </div>
       <!-- </div>    -->
       
       <div class="card shadow border-0 rounded-4 p-4 mx-5">
           <table class="table table-dark table-striped">
                <thead>
                    <tr>
                    <th scope="col">#</th>
                    <th scope="col">image</th>
                    <th scope="col">name</th>
                    <th scope="col">price</th>
                    <th scope="col">text</th>
                    <th scope="col">type</th>
                    <th scope="col">desc</th>
                    <th scope="col">action</th>



                    </tr>
                </thead>
                <tbody id="tBody">
                
                </tbody>   
            </table>  
        </div>  
  </section>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
